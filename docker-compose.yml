services:
  stotracker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: "2026-04-29 10:20:00"
    environment:
      - "APP_BUILD_DATE=2026-04-29 10:20:00"
    ports:
      - "4545:4545"
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4545/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s