services:
  stotracker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%d %H:%M:%S')}
    ports:
      - "4545:4545"
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4545/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s